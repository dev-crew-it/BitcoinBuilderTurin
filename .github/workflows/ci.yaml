name: CI
on:
  push:
    branches:
    - main
  pull_request:
    branches:
    - main

# Allow the deploy job to publish to GitHub Pages via the official Actions flow.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress publish.
concurrency:
  group: pages
  cancel-in-progress: false

defaults:
  run:
    shell: bash

env:
  ZOLA_VERSION: "0.19.2"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Install zola
      run: |
        curl -sSL "https://github.com/getzola/zola/releases/download/v${ZOLA_VERSION}/zola-v${ZOLA_VERSION}-x86_64-unknown-linux-gnu.tar.gz" | tar xz
        sudo mv zola /usr/local/bin/
    - name: Check links
      run: |
        zola serve &
        sleep 2
        ./bin/check-links
        kill $(jobs -p) || true
    - name: Build
      run: zola build
    - name: Add CNAME for the custom domain
      run: cp CNAME public/
    - name: Upload Pages artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: public

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
